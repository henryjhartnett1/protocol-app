<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tasks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--bg1:#111;--bg2:#161616;--bg3:#1e1e1e;
  --border:#1f1f1f;--border2:#2a2a2a;
  --text:#f0f0f0;--muted:#6b7280;--muted2:#9ca3af;
  --accent:#a3e635;--purple:#8b5cf6;--purple-dim:rgba(139,92,246,0.15);
  --gold:#f59e0b;--green:#22c55e;--red:#ef4444;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100%;overflow:hidden;}
::-webkit-scrollbar{display:none;}

/* ── HEADER ── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:56px;background:var(--bg);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
}
.header-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;}
.header-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;}
.xp-badge{display:flex;align-items:center;gap:5px;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.25);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:800;color:var(--purple-light,#a78bfa);}
.xp-badge span{color:#c4b5fd;}

/* ── WEEK SELECTOR ── */
.week-wrap{position:fixed;top:56px;left:0;right:0;z-index:99;background:var(--bg);padding:12px 16px 10px;border-bottom:1px solid var(--border);}
.week-row{display:flex;gap:4px;overflow-x:auto;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.week-row::-webkit-scrollbar{display:none;}
.day-btn{flex:0 0 auto;width:42px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 2px;border-radius:12px;transition:background .15s;}
.day-btn:hover{background:var(--bg2);}
.day-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.day-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--muted2);transition:all .2s;}
.day-btn.today .day-label{color:var(--purple-light,#a78bfa);}
.day-btn.today .day-num{background:var(--purple);color:#fff;box-shadow:0 0 16px rgba(139,92,246,0.4);}
.day-btn.selected:not(.today) .day-num{background:var(--bg3);color:var(--text);border:1px solid var(--border2);}
.day-btn.has-tasks .day-num::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);}
.day-num-wrap{position:relative;display:flex;align-items:center;justify-content:center;}

/* ── SCROLL AREA ── */
.scroll-area{position:fixed;top:120px;left:0;right:0;bottom:60px;overflow-y:auto;padding:16px 16px 24px;}

/* ── PROGRESS SECTION ── */
.progress-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;margin-bottom:16px;}
.progress-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.progress-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.progress-count{font-size:13px;font-weight:800;color:var(--text);}
.progress-count span{color:var(--accent);}
.progress-bar-track{height:6px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--purple),var(--accent));transition:width .4s ease;}

/* ── TODAY HEADER ── */
.today-header{margin-bottom:12px;}
.today-header-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.today-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--purple-light,#a78bfa);margin-bottom:4px;}
.today-date{font-size:26px;font-weight:900;color:#fff;letter-spacing:-0.5px;margin-bottom:2px;}
.today-sub{font-size:12px;color:var(--muted2);font-weight:500;}
.edit-tasks-btn{flex-shrink:0;padding:9px 18px;border-radius:20px;background:var(--bg2);border:1px solid var(--border2);color:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.edit-tasks-btn:hover{border-color:var(--muted2);}
.edit-tasks-btn.active{background:var(--red);border-color:var(--red);color:#fff;}

/* ── TASK LIST ── */
.task-list{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.task-item{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .15s, opacity .3s, max-height .4s;
  overflow:hidden;max-height:100px;
}
.task-item:last-child{border-bottom:none;}
.task-item:hover{background:var(--bg3);}
.task-item.completing{animation:taskComplete .5s ease forwards;}
@keyframes taskComplete{
  0%{opacity:1;transform:translateX(0);}
  30%{opacity:1;transform:translateX(8px);background:rgba(34,197,94,0.08);}
  100%{opacity:0;transform:translateX(20px);max-height:0;padding:0 16px;}
}
.task-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--bg3);overflow:hidden;}
.task-icon-img{width:100%;height:100%;object-fit:cover;border-radius:inherit;}
.task-body{flex:1;min-width:0;}
.task-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:2px;}
.task-price{font-size:12px;font-weight:700;color:#a855f7;}
.task-desc{font-size:12px;color:var(--muted2);line-height:1.3;}
.task-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:transparent;}
.task-circle.done{background:var(--green);border-color:var(--green);}
.task-circle svg{opacity:0;transform:scale(0.5);transition:all .2s;}
.task-circle.done svg{opacity:1;transform:scale(1);}
.task-circle.edit-remove{background:var(--red);border-color:var(--red);cursor:pointer;}
.task-circle.edit-remove svg{opacity:1;transform:scale(1);}
.task-circle.add-back{background:var(--green);border-color:var(--green);cursor:pointer;}
.task-circle.add-back svg{opacity:1;transform:scale(1);}

.purchase-cat:last-child .purchase-cat-header{border-bottom:none;}
.purchase-arrow{font-size:22px;line-height:1;color:var(--muted);flex-shrink:0;display:inline-block;transition:transform .2s;transform:rotate(180deg);}
.purchase-arrow.open{transform:rotate(0deg);}
.purchase-cat-items{display:none;background:var(--bg1,#0d0d10);}
.purchase-cat-items.open{display:block;}
.purchase-cat-items .task-item{padding-left:40px;position:relative;}
.purchase-cat-items .task-item::before{content:'•';position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:18px;}
.purchase-cat-items .task-item:last-child{border-bottom:none;}

/* ── MOBILE ── */
@media (max-width: 380px) {
  .header{padding:0 14px;}
  .week-wrap{padding:10px 10px 8px;}
  .week-row{gap:2px;}
  .day-btn{padding:6px 0;}
  .day-num{width:30px;height:30px;font-size:13px;}
  .day-label{font-size:8px;}
  .scroll-area{padding:14px 12px 24px;}
  .today-date{font-size:22px;}
  .task-item{padding:12px 14px;gap:10px;}
  .task-icon{width:36px;height:36px;font-size:17px;}
}

/* ── TIME-OF-DAY SECTIONS ── */
.tod-section{margin-bottom:20px;}
.tod-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 2px;}
.tod-icon{font-size:15px;}
.tod-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);flex:1;}
.tod-count{font-size:11px;font-weight:700;color:var(--muted);background:var(--bg2);border:1px solid var(--border);padding:2px 9px;border-radius:20px;}
.tod-tasks{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;overflow:hidden;}

/* ── SKINCARE GROUP ── */
.skincare-group{margin-bottom:10px;}
.skincare-group-header{
  display:flex;align-items:center;gap:10px;
  padding:13px 16px;cursor:pointer;
  background:var(--bg2);border:1px solid var(--border2);border-radius:14px;
  transition:background .15s;user-select:none;
}
.skincare-group-header:hover{background:var(--bg3);}
.group-icon{font-size:18px;width:36px;height:36px;border-radius:10px;background:rgba(163,230,53,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.group-title{flex:1;font-size:14px;font-weight:700;color:#fff;}
.group-badge{font-size:11px;font-weight:700;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:2px 9px;border-radius:20px;}
.group-arrow{font-size:11px;color:var(--muted);margin-left:4px;transition:transform .2s;}
.group-arrow{transform:rotate(-90deg);}
.group-arrow.open{transform:rotate(0deg);}
.group-tasks-wrap{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;overflow:hidden;margin-top:6px;margin-left:16px;display:none;}
.group-tasks-wrap.open{display:block;}

/* ── EMPTY STATE ── */
.empty-day{text-align:center;padding:48px 24px;color:var(--muted);font-size:14px;}

/* ── ADVANCED BUTTON ── */
.advanced-btn{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg2);border:1px solid var(--border2);border-radius:14px;
  padding:16px;cursor:pointer;margin-bottom:14px;transition:background .15s;
}
.advanced-btn:hover{background:var(--bg3);}
.advanced-btn-left{display:flex;align-items:center;gap:12px;}
.advanced-btn-icon{width:38px;height:38px;border-radius:10px;background:rgba(139,92,246,0.12);display:flex;align-items:center;justify-content:center;font-size:18px;}
.advanced-btn-label{font-size:14px;font-weight:700;color:#fff;}
.advanced-btn-sub{font-size:11px;color:var(--muted2);margin-top:1px;}
.advanced-chevron{color:var(--muted);font-size:18px;}

/* ── ALL DONE STATE ── */
.all-done{display:none;text-align:center;padding:40px 24px;}
.all-done.show{display:block;}
.all-done-emoji{font-size:52px;margin-bottom:16px;}
.all-done-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;}
.all-done-sub{font-size:13px;color:var(--muted2);margin-bottom:24px;line-height:1.5;}
.all-done-stats{display:flex;justify-content:center;gap:24px;margin-bottom:24px;}
.all-done-stat{text-align:center;}
.all-done-stat-val{font-size:24px;font-weight:900;color:var(--accent);margin-bottom:2px;}
.all-done-stat-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.all-done-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:20px;margin-bottom:14px;}

/* ── XP FLOAT ANIMATION ── */
.xp-float{
  position:fixed;font-size:13px;font-weight:800;color:var(--accent);
  pointer-events:none;z-index:999;opacity:1;
  animation:xpFly .8s ease forwards;
}
@keyframes xpFly{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-60px) scale(1.3);}
}

/* ── ADVANCED MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);
  align-items:flex-end;
}
.modal-overlay.show{display:flex;}
.modal-sheet{
  width:100%;background:var(--bg1);border-radius:20px 20px 0 0;
  padding:24px 20px 40px;max-height:80vh;overflow-y:auto;
}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted2);margin-bottom:20px;}
.adv-task-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.adv-task-item:last-child{border-bottom:none;}
.adv-task-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(139,92,246,0.1);flex-shrink:0;}
.adv-task-name{font-size:14px;font-weight:700;color:#fff;}
.adv-task-desc{font-size:11px;color:var(--muted2);margin-top:2px;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:60px;
  background:var(--bg);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 16px;flex:1;}
.nav-item svg{opacity:0.4;}
.nav-item span{font-size:10px;font-weight:600;letter-spacing:0.5px;color:var(--muted);text-transform:capitalize;}
.nav-item.active svg{opacity:1;}
.nav-item.active span{color:#a3e635;}
.nav-item.active svg path,.nav-item.active svg rect,.nav-item.active svg circle,.nav-item.active svg polyline,.nav-item.active svg line{stroke:#a3e635;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <button class="header-btn" onclick="window.location.href='/dashboard'">

</div>

<!-- WEEK SELECTOR -->
<div class="week-wrap">

</div>

<!-- SCROLL AREA -->

  <!-- PROGRESS -->

  <!-- TASK LIST (sections rendered dynamically) -->

    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='/dashboard'">

  </div>
  <div class="nav-item active">

// Visit /tasks?resetTasks=1 in any mobile browser (no devtools needed) to
// clear every "added to daily" task — everything goes back to "+ Add to Daily".
if (new URLSearchParams(location.search).get('resetTasks') === '1') {

// Shared app state (level/xp/streak) — same localStorage key + schema as
// dashboard.html, so XP and streak stay in sync across pages.
const DEFAULT_STATE = {
  level: 1, xp: 0, xpForLevel: 50,
  streak: 0, lastActiveDate: null, lastCompleteDateKey: '',
  completedAreas: [], onboardingDone: false,
};
function loadState() {
  try {
    const s = localStorage.getItem('protocol_state');
    return s ? { ...DEFAULT_STATE, ...JSON.parse(s) } : { ...DEFAULT_STATE };
  } catch(e) { return { ...DEFAULT_STATE }; }
}
function saveState() { localStorage.setItem('protocol_state', JSON.stringify(state)); }
let state = loadState();

// XP required to clear each level: 50, 100, 200, 400, 500, 600, 700, 800,
// 900, 1000 — then stays at 1000 for every level after that. Mirrored in
// dashboard.html and improve.html so leveling stays in sync everywhere.
const XP_LEVEL_TABLE = [50, 100, 200, 400, 500, 600, 700, 800, 900, 1000];
function xpNeeded(level) { return XP_LEVEL_TABLE[level - 1] || 1000; }

function addXP(amount) {
  const fromLevel = state.level;
  state.xp += amount;
  while (state.xp >= state.xpForLevel) {
    state.xp -= state.xpForLevel;
    state.level++;
    state.xpForLevel = xpNeeded(state.level);
  }
  saveState();
  return { leveledUp: state.level > fromLevel, fromLevel, toLevel: state.level };
}

function dateKeyOf(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function registerDailyCompletion() {
  const today = dateKeyOf(new Date());
  if (state.lastCompleteDateKey === today) return;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  const yKey = dateKeyOf(yesterday);
  if (state.lastCompleteDateKey === yKey || state.lastCompleteDateKey === '') {
    state.streak++;
  } else {
    state.streak = 1;
  }
  state.lastCompleteDateKey = today;
  saveState();
}

// ── BUILD WEEK ─────────────────────────────────────────────────────────────
// Scrollable date strip: starts today and runs 3 months out. Since it's
// always built from `new Date()`, the window rolls forward automatically
// each day (today is always day 0, "3 months ahead" is always 3 months
// ahead of whenever this is opened).
function buildWeek() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const row = document.getElementById('weekRow');
  row.innerHTML = '';

  const end = new Date(today);
  end.setMonth(end.getMonth() + 3);
  const totalDays = Math.round((end - today) / 86400000);

  let selectedBtn = null;
  let todayBtn = null;

  for (let i = 0; i <= totalDays; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const isToday = d.toDateString() === today.toDateString();
    const isSelected = d.toDateString() === selectedDate.toDateString();

    const btn = document.createElement('div');
    btn.className = 'day-btn' + (isToday ? ' today' : '') + (isSelected ? ' selected' : '');
    btn.innerHTML = `
      <div class="day-label">${dayNames[d.getDay()]}</div>
      <div class="day-num-wrap"><div class="day-num">${d.getDate()}</div></div>`;
    btn.addEventListener('click', () => {
      selectedDate = new Date(d);
      buildWeek();
      renderTasks();
    });
    if (isToday) todayBtn = btn;
    if (isSelected) selectedBtn = btn;
    row.appendChild(btn);
  }

  const target = selectedBtn || todayBtn;
  if (target) target.scrollIntoView({ block: 'nearest', inline: 'center' });
}

// ── DYNAMIC WEEKLY TASK DAY ASSIGNMENT ─────────────────────────────────────
// Weekly tasks shouldn't all pile onto the same hardcoded day. Instead, the
// active weekly tasks in the user's plan are spread evenly across the 7
// days so (when there are enough of them) every day pairs the daily
// routine with one weekly task. Assignments are persisted so a given task
// always lands on the same day until the active set changes.
function getWeeklyAssignments() {
  let stored = {};
  try { stored = JSON.parse(localStorage.getItem('protocol_weekly_assignments') || '{}'); } catch(e){}

  const activeIds = Object.entries(planState)
    .filter(([id, state]) => state === 'have' && TASK_META[id] && TASK_META[id].type === 'weekly')
    .map(([id]) => id)
    .sort();

  // Drop assignments for tasks no longer active
  Object.keys(stored).forEach(id => { if (!activeIds.includes(id)) delete stored[id]; });

  // Evenly distribute: always place the next task on the day that
  // currently has the fewest weekly tasks assigned.
  const counts = [0,0,0,0,0,0,0];
  Object.values(stored).forEach(d => { counts[d]++; });

  activeIds.forEach(id => {
    if (stored[id] === undefined) {
      let bestDay = 0;
      for (let d = 1; d < 7; d++) { if (counts[d] < counts[bestDay]) bestDay = d; }
      stored[id] = bestDay;
      counts[bestDay]++;
    }
  });

  localStorage.setItem('protocol_weekly_assignments', JSON.stringify(stored));
  return stored;
}

// ── GET TODAY'S TASKS GROUPED BY TIME-OF-DAY ──────────────────────────────
function getTasksForDate(date) {
  const dow = date.getDay(); // 0=Sun..6=Sat
  const groups = { morning: [], day: [], night: [], purchase: [] };
  const weeklyAssignments = getWeeklyAssignments();

  for (const [id, state] of Object.entries(planState)) {
    const meta = TASK_META[id];
    if (!meta) continue;

    if (state === 'buying') {
      // Show "Buy X" task in its own Purchase section until bought — but once
      // it's been checked off, it moves into the pending-arrivals queue
      // (asked about on the dashboard) instead of reappearing here every day.
      const pending = getPendingArrivals();
      if (!pending[id]) groups.purchase.push('buy__' + id);
    } else if (state === 'have') {
      const eligible =
        meta.type === 'daily' ||
        (meta.type === 'weekly' && weeklyAssignments[id] === dow);
      if (eligible) {
        const bucket = meta.tod || 'morning';
        groups[bucket].push(id);
      }
    }
  }

  return groups;
}

// ── RESOLVE TASK META (handles buy__ synthetic tasks) ─────────────────────
function resolveMeta(taskId) {
  if (taskId.startsWith('buy__')) {
    const realId = taskId.slice(5);
    const real = TASK_META[realId];
    if (!real) return null;
    // buyName lets the purchase-task label drop action verbs like "Apply"/
    // "Use"/"Wear" that only make sense for the routine task, not the product
    // itself (e.g. real.name "Apply Retinol" -> buy label "Retinol").
    const buyLabel = real.buyName || real.name;
    return { icon: real.icon || '🛒', name:'Buy ' + buyLabel, desc:'Pick up ' + buyLabel + ' so you can start using it', tod:'morning', _buyFor: realId, price: real.price };
  }
  return TASK_META[taskId] || null;
}

function renderTasks() {
  const dateKey = getDateKey(selectedDate);
  const completions = getCompletions(dateKey);
  const rawGroups = getTasksForDate(selectedDate);
  const hiddenAll = getHiddenTasks(dateKey);

  // Hidden tasks (removed via the red minus in edit mode) are pulled out of
  // their normal time-of-day section and surfaced in "Hidden Tasks" instead.
  const groups = {
    morning:  rawGroups.morning.filter(id => !hiddenAll.includes(id)),
    day:      rawGroups.day.filter(id => !hiddenAll.includes(id)),
    night:    rawGroups.night.filter(id => !hiddenAll.includes(id)),
    purchase: rawGroups.purchase.filter(id => !hiddenAll.includes(id)),
  };
  const scheduledToday = [...rawGroups.morning, ...rawGroups.day, ...rawGroups.night, ...rawGroups.purchase];
  const hiddenIds = hiddenAll.filter(id => scheduledToday.includes(id));
  const allTasks = [...groups.morning, ...groups.day, ...groups.night, ...groups.purchase];

  // Today header
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const isToday = selectedDate.toDateString() === new Date().toDateString();
  const remaining = allTasks.filter(id => !completions.includes(id)).length;

  document.getElementById('todayHeader').innerHTML = `
    <div class="today-header-row">
      <div class="today-header-text">
        <div class="today-label">${isToday ? 'TODAY' : dayNames[selectedDate.getDay()].toUpperCase()}</div>
        <div class="today-date">${dayNames[selectedDate.getDay()]}, ${monthNames[selectedDate.getMonth()]} ${selectedDate.getDate()}</div>
        <div class="today-sub">${allTasks.length === 0 ? 'No tasks for this day' : remaining === 0 ? 'All tasks complete 🎯' : `${remaining} Task${remaining !== 1 ? 's' : ''} To Complete`}</div>
      </div>
      <button class="edit-tasks-btn${editMode ? ' active' : ''}" onclick="toggleEditMode()">${editMode ? 'Done' : 'Edit'}</button>
    </div>
  `;

  // Progress bar
  const doneCount = completions.filter(id => allTasks.includes(id)).length;
  const totalCount = allTasks.length;
  const pct = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;
  document.getElementById('doneCount').textContent = doneCount;
  document.getElementById('totalCount').textContent = totalCount;
  document.getElementById('progressFill').style.width = pct + '%';

  const list = document.getElementById('taskList');

  function taskCard(id) {
    const meta = resolveMeta(id);
    if (!meta) return '';
    if (completions.includes(id)) return '';
    const isBuy = id.startsWith('buy__');
    const circleHtml = editMode
      ? `<div class="task-circle edit-remove" onclick="hideTask('${id}','${dateKey}', event)">
           <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="2" y1="6" x2="10" y2="6"/></svg>
         </div>`
      : `<div class="task-circle">
           <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5"><polyline points="2 6 5 9 10 3"/></svg>
         </div>`;
    return `
      <div class="task-item" id="task-${CSS.escape(id)}" onclick="${editMode ? '' : `completeTask('${id}','${dateKey}')`}">
        <div class="task-icon" style="${isBuy ? 'background:rgba(245,158,11,0.12);' : ''}">${renderIcon(meta.icon)}</div>
        <div class="task-body">
          <div class="task-name">${meta.name}${isBuy && meta.price != null ? ` <span class="task-price">$${meta.price}</span>` : ''}</div>
          <div class="task-desc">${meta.desc}</div>
        </div>
        ${circleHtml}
      </div>`;
  }

  function hiddenCard(id) {
    const meta = resolveMeta(id);
    if (!meta) return '';
    const isBuy = id.startsWith('buy__');
    return `
      <div class="task-item" id="hidden-task-${CSS.escape(id)}">
        <div class="task-icon" style="${isBuy ? 'background:rgba(245,158,11,0.12);' : ''}">${renderIcon(meta.icon)}</div>
        <div class="task-body">
          <div class="task-name">${meta.name}${isBuy && meta.price != null ? ` <span class="task-price">$${meta.price}</span>` : ''}</div>
          <div class="task-desc">${meta.desc}</div>
        </div>
        <div class="task-circle add-back" onclick="unhideTask('${id}','${dateKey}', event)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="6" y1="2" x2="6" y2="10"/><line x1="2" y1="6" x2="10" y2="6"/></svg>
        </div>
      </div>`;
  }

  function renderPurchaseCategories(ids) {
    const byCat = {};
    ids.forEach(id => {
      const realId = id.startsWith('buy__') ? id.slice(5) : id;
      const catKey = getPurchaseCategory(realId);
      if (!byCat[catKey]) byCat[catKey] = [];
      byCat[catKey].push(id);
    });

    return PURCHASE_CATEGORIES.map(({ key, label, icon }) => {
      const catIds = byCat[key] || [];
      if (catIds.length === 0) return '';
      const total = catIds.reduce((sum, id) => {
        const meta = resolveMeta(id);
        return sum + (meta && meta.price != null ? meta.price : 0);
      }, 0);
      const isOpen = !!purchaseCatOpen[key];
      return `
        <div class="purchase-cat">
          <div class="task-item purchase-cat-header" onclick="togglePurchaseCat('${key}')">
            <div class="task-icon">${renderIcon(icon)}</div>
            <div class="task-body">
              <div class="task-name">${label} <span class="task-price">$${total}</span></div>
              <div class="task-desc">${catIds.length} item${catIds.length !== 1 ? 's' : ''} to purchase</div>
            </div>
            <div class="purchase-arrow${isOpen ? ' open' : ''}" id="purchase-arrow-${key}">▾</div>
          </div>
          <div class="purchase-cat-items${isOpen ? ' open' : ''}" id="purchase-items-${key}">
            ${catIds.map(taskCard).join('')}
          </div>
        </div>`;
    }).join('');
  }

  function renderAreaCategories(sectionKey, ids) {
    const byCat = {};
    ids.forEach(id => {
      const catKey = getAreaCategory(id);
      if (!byCat[catKey]) byCat[catKey] = [];
      byCat[catKey].push(id);
    });

    return DAILY_CATEGORIES.map(({ key, label, icon }) => {
      const catIds = byCat[key] || [];
      if (catIds.length === 0) return '';
      const compKey = sectionKey + '_' + key;
      const isOpen = !!areaCatOpen[compKey];
      return `
        <div class="purchase-cat">
          <div class="task-item purchase-cat-header" onclick="toggleAreaCat('${compKey}')">
            <div class="task-icon">${renderIcon(icon)}</div>
            <div class="task-body">
              <div class="task-name">${label}</div>
              <div class="task-desc">${catIds.length} task${catIds.length !== 1 ? 's' : ''}</div>
            </div>
            <div class="purchase-arrow${isOpen ? ' open' : ''}" id="area-arrow-${compKey}">▾</div>
          </div>
          <div class="purchase-cat-items${isOpen ? ' open' : ''}" id="area-items-${compKey}">
            ${catIds.map(taskCard).join('')}
          </div>
        </div>`;
    }).join('');
  }

  const sectionsHtml = TOD_CONFIG.map(({ key, icon, label }) => {
    const ids = groups[key] || [];
    const sectionRemaining = ids.filter(id => !completions.includes(id)).length;
    if (ids.length === 0 || sectionRemaining === 0) return '';

    const remainingIds = ids.filter(id => !completions.includes(id));
    const tasksHtml = key === 'purchase'
      ? renderPurchaseCategories(remainingIds)
      : renderAreaCategories(key, remainingIds);

    return `
      <div class="tod-section" id="tod-${key}">
        <div class="tod-header">
          <span class="tod-icon">${icon}</span>
          <span class="tod-label">${label}</span>
          <span class="tod-count" id="tod-count-${key}">${sectionRemaining}</span>
        </div>
        <div class="tod-tasks">${tasksHtml}</div>
      </div>`;
  }).join('');

  const hiddenHtml = hiddenIds.length ? `
    <div class="tod-section" id="tod-hidden">
      <div class="tod-header">
        <span class="tod-icon">🙈</span>
        <span class="tod-label">Hidden Tasks</span>
        <span class="tod-count">${hiddenIds.length}</span>
      </div>
      <div class="tod-tasks">${hiddenIds.map(hiddenCard).join('')}</div>
    </div>` : '';

  if (allTasks.length === 0 && !hiddenIds.length) {
    list.innerHTML = `<div class="empty-day">No tasks for this day.<br><span style="font-size:11px;">Add tasks from the Roadmap to see them here.</span></div>`;
    checkAllDone(allTasks, completions, dateKey);
    document.getElementById('xpDisplay').textContent = state.xp;
    return;
  }

  list.innerHTML = (allTasks.length === 0
    ? `<div class="empty-day">No tasks for this day.<br><span style="font-size:11px;">Add tasks from the Roadmap to see them here.</span></div>`
    : sectionsHtml) + hiddenHtml;

  checkAllDone(allTasks, completions, dateKey);
  document.getElementById('xpDisplay').textContent = xp;
}

// Renders a task icon exactly like improve.html: file-path icons (e.g.
// '/LD.png') become an <img>, everything else (emoji) passes through as-is.
function renderIcon(icon) {
  if (typeof icon === 'string' && /\.(png|jpe?g|webp|svg|gif)$/i.test(icon)) {
    return `<img src="${icon}" class="task-icon-img" alt=""/>`;
  }
  return icon;
}

function getDateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

// ── COMPLETE TASK ──────────────────────────────────────────────────────────
function completeTask(id, dateKey) {
  const completions = getCompletions(dateKey);
  if (completions.includes(id)) return; // already done

  // If this is a "Buy X" task, the user has purchased it but doesn't have it
  // in hand yet — queue it for the daily "Has it arrived?" prompt on the
  // dashboard instead of marking it "have" immediately. It only gets promoted
  // to 'have' (and starts showing up as a real daily/weekly task) once the
  // user confirms there that it's actually arrived.
  if (id.startsWith('buy__')) {
    const realId = id.slice(5);
    const real = TASK_META[realId];
    const pending = getPendingArrivals();
    if (!pending[realId]) {
      pending[realId] = { name: real ? real.name : realId, icon: real ? real.icon : '📦', askedDateKey: '' };
      savePendingArrivals(pending);
    }
  }

  completions.push(id);
  saveCompletions(dateKey, completions);

  // XP — routed through the shared engine so leveling stays in sync with
  // the dashboard, and a real level-up can actually trigger here too.
  const xpGain = 10;
  const xpResult = addXP(xpGain);
  document.getElementById('xpDisplay').textContent = state.xp;
  if (xpResult.leveledUp) showLevelUpToast(xpResult.toLevel);

  // Float XP
  const el = document.getElementById('task-' + CSS.escape(id)) || document.querySelector(`[id="task-${id}"]`);
  if (el) {
    const rect = el.getBoundingClientRect();
    const float = document.createElement('div');
    float.className = 'xp-float';
    float.textContent = '+' + xpGain + ' XP';
    float.style.left = (rect.right - 60) + 'px';
    float.style.top  = (rect.top + rect.height / 2) + 'px';
    document.body.appendChild(float);
    setTimeout(() => float.remove(), 900);

    // Animate task out, then re-render (completed tasks are hidden)
    el.classList.add('completing');
    setTimeout(() => renderTasks(), 480);
  } else {
    renderTasks();
  }
}

// ── ALL DONE ───────────────────────────────────────────────────────────────
function checkAllDone(allTasks, completions, dateKey) {
  const isToday = dateKey === todayKey();
  const allComplete = allTasks.length > 0 && allTasks.every(id => completions.includes(id));

  const allDoneEl = document.getElementById('allDone');
  const taskListEl = document.getElementById('taskList');
  const progressCard = document.getElementById('progressCard');

  if (allComplete && isToday) {
    // Update streak via the shared engine (same key/logic dashboard reads).
    registerDailyCompletion();

    document.getElementById('doneXP').textContent = '+' + (allTasks.length * 10);
    document.getElementById('doneStreak').textContent = state.streak;

    taskListEl.style.display = 'none';
    allDoneEl.classList.add('show');
  } else {
    taskListEl.style.display = '';
    allDoneEl.classList.remove('show');
  }
}

// ── ADVANCED MODAL ─────────────────────────────────────────────────────────
function openAdvanced() {
  document.getElementById('advModal').classList.add('show');
}
function closeAdvanced(e) {
  if (e.target === document.getElementById('advModal')) {
    document.getElementById('advModal').classList.remove('show');
  }
}

// ── INIT ───────────────────────────────────────────────────────────────────
buildWeek();
renderTasks();
</script>
